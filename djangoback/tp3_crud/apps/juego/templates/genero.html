{% extends "base.html" %} {% block page_content %}

<body>
  <div class="container">
    <h1>Géneros</h1>
    <div class="genre-container">
      <button type="button" class="btn genre-button btn-accion">Acción</button>
      <button type="button" class="btn genre-button btn-plataforma">
        Plataforma
      </button>
      <button type="button" class="btn genre-button btn-carreras">
        Carreras
      </button>
      <button type="button" class="btn genre-button btn-rpg">RPG</button>
      <button type="button" class="btn genre-button btn-lucha">Lucha</button>
    </div>
    <div class="genre-container">
      <button type="button" class="btn genre-button btn-shooter">
        Shooter
      </button>
      <button type="button" class="btn genre-button btn-estrategia">
        Estrategia
      </button>
      <button type="button" class="btn genre-button btn-simulador">
        Simulador
      </button>
      <button type="button" class="btn genre-button btn-deportes">
        Deportes
      </button>
      <button type="button" class="btn genre-button btn-rompecabezas">
        Rompecabezas
      </button>
    </div>
    <div class="genre-container">
      <button type="button" class="btn genre-button btn-aventura">
        Aventura
      </button>
      <button type="button" class="btn genre-button btn-misc">Misc</button>
    </div>
  </div>
  <style>
    body {
      background-color: #1a1a1a;
      color: #f8f9fa;
      padding: 20px;
    }
    .genre-container {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .genre-button {
      border-radius: 20px;
      color: white;
      padding: 10px 20px;
      margin: 5px;
      font-weight: bold;
      border: none;
      width: 140px;
      height: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn-accion {
      background-color: #8a2be2;
    } /* Purple */
    .btn-plataforma {
      background-color: #ffa500;
    } /* Orange */
    .btn-carreras {
      background-color: #3366cc;
    } /* Dark Blue */
    .btn-rpg {
      background-color: #8bc34a;
    } /* Lime Green */
    .btn-lucha {
      background-color: #333333;
    } /* Dark Gray */
    .btn-shooter {
      background-color: #b22222;
    } /* Firebrick Red */
    .btn-estrategia {
      background-color: #4caf50;
    } /* Green */
    .btn-simulador {
      background-color: #9370db;
    } /* Medium Purple */
    .btn-deportes {
      background-color: #20b2aa;
    } /* Light Sea Green */
    .btn-rompecabezas {
      background-color: #1a5222;
    } /* Darker Green */
    .btn-aventura {
      background-color: #a00000;
    } /* Dark Red */
    .btn-misc {
      background-color: #008cba;
    } /* Blue */
  </style>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
{% endblock %}
