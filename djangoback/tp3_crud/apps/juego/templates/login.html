{% extends "index.html" %}
{% load static %}
{% block content %}
<style>
      body {
        background-color: #1a1a1a; 
        color: #f8f9fa; 
        font-family: Arial, sans-serif; 
        margin: 0; 
        min-height: 100vh; 
        display: flex;
        flex-direction: column;
      }

      .header-image-container {
        width: 100%;
        height: 200px; /* Altura de la imagen de fondo */
        background-image: url("https://via.placeholder.com/1200x200/222222/FFFFFF?text=Fondo+de+Juegos"); /* Placeholder para la imagen de fondo superior */
        background-size: cover;
        background-position: center;
        position: relative; 
      }

      .header-text {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-size: 0.9rem;
        opacity: 0.7;
      }

      .main-content {
        padding: 40px 20px;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between; 
        align-items: flex-start; 
        flex-grow: 1; 
      }

      .left-panel {
        flex: 1; 
        min-width: 300px; 
        padding-right: 20px; 
      }

      .right-panel {
        flex-basis: 350px; 
        max-width: 400px; 
        background-color: #2b2b2b; 
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      .gamebase-logo {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
      }

      .gamebase-logo img {
        width: 28px; /* Tamaño del icono del logo */
        height: 28px;
        margin-right: 10px;
      } 

      .form-floating label {
        color: #adb5bd; 
      }

      .form-control-dark {
        background-color: #3b3b3b;
        color: #f8f9fa; /* Color del texto dentro de los inputs */
        border: 1px solid #4a4a4a;
      }

      .form-control-dark:focus {
        background-color: #3b3b3b;
        color: #f8f9fa;
        border-color: #0d6efd; /* Color de borde al enfocar */
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25); /* Sombra al enfocar */
      }

      /* Ajuste para los iconos dentro de los inputs */
      .input-group-text-dark {
        background-color: #3b3b3b;
        border: 1px solid #4a4a4a;
        color: #adb5bd; /* Color del icono */
      }

      .btn-primary-custom {
        background-color: #007bff; /* Color azul de login */
        border-color: #007bff;
        width: 100%;
        margin-bottom: 15px; /* Espacio entre botones */
      }

      .btn-primary-custom:hover {
        background-color: #0056b3;
        border-color: #0056b3;
      }

      .btn-google {
        background-color: #fff;
        color: #212529;
        border: 1px solid #ced4da;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px; /* Espacio entre icono y texto */
      }

      .btn-google:hover {
        background-color: #e2e6ea;
        border-color: #dae0e5;
      }

      .btn-google img {
        height: 20px; /* Tamaño del icono de Google */
      }

      /* Media queries para responsividad */
      @media (max-width: 768px) {
        .main-content {
          flex-direction: column; /* Apila los paneles en pantallas pequeñas */
          align-items: center; /* Centra los paneles */
        }
        .left-panel,
        .right-panel {
          width: 90%; /* Ocupa más ancho en móvil */
          padding: 0;
        }
        .left-panel {
          margin-bottom: 30px; /* Espacio entre los paneles apilados */
          padding-right: 0;
          text-align: center; /* Centra el logo y el texto en móvil */
        }
        .right-panel {
          min-width: unset; /* Quita el min-width para mobile */
        }
      }
    
</style>
    <div class="header-image-container">
    </div>

    <div class="container-fluid main-content">
      <div class="left-panel">
        <div class="gamebase-logo">
          <img src="{% static 'img/logoGB.png' %}" alt="GameBase Logo" />
          <h2>GameBase</h2>
        </div>
        <h2>Ingresar</h2>
      </div>

      <div class="right-panel">
        {% if messages %}
        <ul class="messages">
        {% for message in messages %}
          <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>
        {{ message }}
          </li>
         {% endfor %}
         </ul>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="inputEmail" class="form-label visually-hidden"
              >Correo electrónico</label
            >
            <div class="input-group">
              <span class="input-group-text input-group-text-dark"
                ><i class="bi bi-envelope"></i
              ></span>
              <input
                type="email"
                name="username"
                class="form-control form-control-dark"
                id="username"
                placeholder="Correo electrónico"
                required
              />
            </div>
          </div>
          <div class="mb-3">
            <label for="inputPassword" class="form-label visually-hidden"
              >Contraseña</label
            >
            <div class="input-group">
              <span class="input-group-text input-group-text-dark"
                ><i class="bi bi-lock"></i
              ></span>
              <input
                type="password"
                name="password"
                class="form-control form-control-dark"
                id="password"
                placeholder="Contraseña"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn btn-primary-custom">Login</button>
          <button type="button" class="btn btn-google">
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/1024px-Google_%22G%22_logo.svg.png"
              alt="Google Logo"
            />
            Continuar con Google
          </button>
        </form>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
{% endblock %}
