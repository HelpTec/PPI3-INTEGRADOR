{% extends "index.html" %}
{% load static %}
{% block content %}
<style>
    /* Ensure html and body take full width and height, and remove default margins */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        background-color: #111; /* Dark background for the page */
        color: #e0e0e0; /* Default light text color */
        line-height: 1.6;
    }

    .header-image-container {
        width: 100%;
        height: 250px;
        background-image: url("{% static 'img/mario.png' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        position: relative;
        flex-shrink: 0;
    }

    /* --- Image Fade Out Effect --- */
    .header-image-container::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* Gradient from transparent to the page background color */
        background: linear-gradient(to bottom, rgba(17,17,17,0) 0%, rgba(17,17,17,0) 70%, rgba(17,17,17,1) 100%);
        pointer-events: none;
    }

    /* --- NEW SINGLE COLUMN LAYOUT --- */
    .main-container {
        display: flex;
        flex-direction: column; /* Stacks items (logo, form) vertically */
        align-items: center;    /* Centers items horizontally */
        padding: 40px 20px;     /* Adds padding around the content */
    }

    .gamebase-logo {
        margin-bottom: 30px; /* Space between logo and form */
    }

    .gamebase-logo img {
        width: 200px;
        height: 60px;
    }

    /* --- FORM CONTAINER STYLES (Previously .right-panel) --- */
    .form-container {
        background-color: #1a1a1a; /* Dark form background */
        padding: 2.5em;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        width: 100%;
        max-width: 400px; /* Constrains the width of the form */
    }

    .form-container label {
        display: block;
        margin-bottom: 0.5em;
        font-weight: bold;
        color: #ffffff; /* White color for labels */
    }

    .form-container input[type="email"],
    .form-container input[type="password"] {
        width: 100%;
        padding: 0.7em;
        margin-bottom: 1.5em;
        border: 1px solid #555; /* Darker border */
        border-radius: 8px; /* Rounded corners */
        background-color: #282828; /* Dark input background */
        color: #e0e0e0;
        box-sizing: border-box; /* Ensures padding doesn't affect width */
    }

    .form-container input[type="email"]::placeholder,
    .form-container input[type="password"]::placeholder {
        color: #999; /* Lighter placeholder text */
    }

    .btn-login {
        width: 100%;
        padding: 0.8em;
        background-color: #1DB954; /* Spotify Green */
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        font-size: 1.1em;
        transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .btn-login:hover {
        background-color: #1ed760; /* Lighter green on hover */
        transform: translateY(-2px); /* Slight lift effect */
    }
    
    .register-link {
        display: block;
        text-align: center;
        margin-top: 1.5em;
        color: #b0b0b0;
        text-decoration: none;
        font-size: 0.95em;
    }
    
    .register-link:hover {
        color: #ffffff;
        text-decoration: underline;
    }

    .btn-google {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 0.8em;
        background-color: #ffffff;
        color: #444;
        border: 1px solid #555;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        font-size: 1em;
        text-decoration: none;
        margin-top: 1em;
        transition: background-color 0.3s ease;
    }

    .btn-google:hover {
        background-color: #f0f0f0;
        color: #222;
    }

    .btn-google svg {
        flex-shrink: 0;
    }

    .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 1.2em 0 0.2em;
        color: #888;
        font-size: 0.85em;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        border-top: 1px solid #444;
    }

    /* Django messages styling */
    .messages {
        list-style: none;
        padding: 0;
        margin-bottom: 1.5em;
    }
    .messages li {
        padding: 0.7em;
        border-radius: 8px;
        background-color: #ff6347; /* Error color */
        color: white;
        text-align: center;
    }

    /* --- RESPONSIVE DESIGN --- */
    @media (max-width: 576px) {
        .form-container {
            padding: 2em 1.5em; /* Adjust padding on smaller screens */
        }
    }
</style>

<div class="header-image-container"></div>

<div class="main-container">
    <div class="gamebase-logo">
        <a href="/"><img src="{% static 'img/logoGB.png' %}" alt="GameBase Logo" /></a>
    </div>

    <div class="form-container">
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>
                        {{ message }}
                    </li>
                {% endfor %}
            </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <label for="username">Correo electrónico</label>
            <input
                type="name"
                name="username"
                id="username"
                placeholder="Correo electrónico"
                required
            />
            
            <label for="password">Contraseña</label>
            <input
                type="password"
                name="password"
                id="password"
                placeholder="Contraseña"
                required
            />

            <button type="submit" class="btn-login">Ingresar</button>

            <div class="divider">o</div>

            <a href="/accounts/google/login/" class="btn-google">
                <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                    <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                    <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                    <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                </svg>
                Ingresar con Google
            </a>

            <a href="/register" class="register-link">
                No tienes una cuenta? Registrate!
            </a>
        </form>
    </div>
</div>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
></script>
{% endblock %}
