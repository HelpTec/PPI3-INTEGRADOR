{% extends "base.html" %}
{% load static %}

{% block extra_head %}
<style>
    #game {
        width: 100%;
        height: 80vh;
        display: block;
    }
</style>
{% endblock %}

{% block page_content %}
<div id="game"></div>
<script>
    EJS_player = "#game";
    EJS_core = "nes";
    EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
    EJS_gameUrl = '{% static "emulatorjs/roms/pentablocat.nes" %}';
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
{% endblock %}
