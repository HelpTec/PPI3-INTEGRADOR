<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameBase - Ingresar</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="header-image-container">
      <span class="header-text">Principal</span>
    </div>

    <div class="container-fluid main-content">
      <div class="left-panel">
        <div class="gamebase-logo">
          <img src="./recursos/logoGB.png" alt="GameBase Logo" />
          <h2>GameBase</h2>
        </div>
        <h2>Ingresar</h2>
      </div>

      <div class="right-panel">
        <form>
          <div class="mb-3">
            <label for="inputEmail" class="form-label visually-hidden"
              >Correo electrónico</label
            >
            <div class="input-group">
              <span class="input-group-text input-group-text-dark"
                ><i class="bi bi-envelope"></i
              ></span>
              <input
                type="email"
                class="form-control form-control-dark"
                id="inputEmail"
                placeholder="Correo electrónico"
                required
              />
            </div>
          </div>
          <div class="mb-3">
            <label for="inputPassword" class="form-label visually-hidden"
              >Contraseña</label
            >
            <div class="input-group">
              <span class="input-group-text input-group-text-dark"
                ><i class="bi bi-lock"></i
              ></span>
              <input
                type="password"
                class="form-control form-control-dark"
                id="inputPassword"
                placeholder="Contraseña"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn btn-primary-custom">Login</button>
          <button type="button" class="btn btn-google">
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/1024px-Google_%22G%22_logo.svg.png"
              alt="Google Logo"
            />
            Continuar con Google
          </button>
        </form>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
