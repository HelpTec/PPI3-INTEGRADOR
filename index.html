<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GameBase</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img
              src="./recursos/logoGB.png"
              alt="GameBase Logo"
              width="30"
              height="24"
              class="d-inline-block align-text-top"
            />
            GameBase
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#"
                  >Géneros</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Plataformas</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Décadas</a>
              </li>
            </ul>
            <div class="d-flex">
              <a class="btn btn-outline-info" href="#">
                <i class="bi bi-person-fill"></i> Ingresar
              </a>
            </div>
          </div>
        </div>
      </nav>
      <div id="games-container" class="cards-container">
        <!-- Aquí se cargarán las cards -->
      </div>
      <button id="load-more">Cargar más</button>
    </main>

    <script src="scripts.js"></script>
  </body>
</html>
